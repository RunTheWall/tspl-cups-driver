<style>

  .bar select{ font:600 18px Inter; padding:11px 16px; border-radius:9px; border:0; min-width:430px; cursor:pointer; }

  .name{ font:700 15px Inter; letter-spacing:.12em; text-transform:uppercase; color:#222; }
  .stage{ width:600px; height:900px; background:#fff; box-shadow:0 14px 50px rgba(0,0,0,.45); overflow:hidden; }
  /* every card is authored at 1200x1800 (4x6 @300dpi) and scaled 0.5 for preview */
  .card{ width:1200px; height:1800px; transform:scale(.5); transform-origin:top left; background:#fff; color:var(--ink);
         padding:84px; display:none; flex-direction:column; -webkit-font-smoothing:antialiased; position:relative; }
  .card.on{ display:flex; }
  /* ?full → render one card at native 1200x1800 (for export/print) */
  body.full{ padding:0; background:#fff; gap:0; }
  body.full .bar, body.full .name{ display:none; }
  body.full .stage{ width:1200px; height:1800px; box-shadow:none; }
  body.full .card{ transform:none; }
  /* shared atoms */
  .eyebrow{ font-size:27px; font-weight:800; letter-spacing:.30em; }
  .big{ font-family:'Bebas Neue'; line-height:.84; letter-spacing:.01em; }
  .rule{ border-top:4px solid #000; } .hair{ border-top:2px solid #000; }
  .mono{ font-family:'JetBrains Mono',monospace; }
  .qr{ width:300px; height:300px; image-rendering:pixelated; display:block; }
  .url{ font-family:'Bebas Neue'; line-height:.84; }
  b{ font-weight:800; }

  .ed-bar i{ width:19px; height:19px; border:2.5px solid #000; border-radius:50%; display:block; }
  .ed-file{ position:absolute; left:50%; transform:translateX(-50%); font:500 23px 'IBM Plex Mono',monospace; }
  /* inside the window = Constly's real fonts: IBM Plex Sans (text) + Plex Mono (chrome) */

  .ed-h{ font-family:'IBM Plex Sans',sans-serif; font-weight:700; font-size:62px; line-height:1.12; letter-spacing:-.015em; }
  .ed-h .mk,.ed-p .mk{ -webkit-text-stroke:2px #000; color:#fff; }   /* hollow markdown marks */
  .ed-ct{ display:inline-block; width:5px; height:52px; background:#000; vertical-align:-9px; margin-left:6px; }
  .ed-p{ font-size:31px; line-height:1.55; margin-top:38px; font-weight:400; }
  .ed-li{ font-size:30px; margin-top:26px; display:flex; align-items:center; gap:15px; }
  .ed-li .bx{ width:30px; height:30px; border:3px solid #000; border-radius:8px; position:relative; flex:none; }
  .ed-li .bx.x::after{ content:"✓"; position:absolute; left:4px; top:-11px; font-size:33px; font-weight:800; }
  /* CTA block */
  .cta{ display:flex; align-items:center; gap:46px; }
  .scan{ font-size:28px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; }
  /* footer */
