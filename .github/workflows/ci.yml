name: ci
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, ubuntu-24.04-arm ]   # amd64 + free arm64 runner
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential libcups2-dev
      - name: Build
        run: make -s && file src/rastertotspl
      - name: Shellcheck scripts parse
        run: |
          sh -n install.sh
          sh -n packaging/deb/build.sh
          sh -n backend/tspl
