name: "🖨️ Printer report (works / doesn't work)"
description: "Tell us how your TSPL label printer does with this driver — this is how the Supported list grows."
title: "[printer] "
labels: ["printer-report"]
body:
  - type: markdown
    attributes:
      value: "Thanks! Confirmed printers get moved to ✅ in the README and added to auto-detect. A few quick fields make that possible."
  - type: input
    id: model
    attributes:
      label: Printer model
      placeholder: "e.g. Munbyn ITPP941, iDPRT SP410, HPRT N41"
    validations:
      required: true
  - type: dropdown
    id: result
    attributes:
      label: Does it work?
      options:
        - "✅ Works great"
        - "⚠️ Works with tweaks (say which below)"
        - "❌ Doesn't work"
    validations:
      required: true
  - type: input
    id: usbid
    attributes:
      label: USB id
      description: "Run `lsusb` and paste the id for your printer."
      placeholder: "20d1:7008"
  - type: input
    id: tsplt
    attributes:
      label: "TSPL check (ieee1284 id, or ~!T reply)"
      description: "cat /sys/class/usbmisc/lp0/device/ieee1284_id — or the ~!T probe from the README (no reply is fine; many clones are write-only over USB)."
      placeholder: "e.g. MFG:iDPRT;CMD:TSPL;MDL:SP410  —  or  HZD950-PRO"
  - type: input
    id: env
    attributes:
      label: Distro · arch · dpi
      placeholder: "Raspberry Pi OS Trixie · arm64 · 203 dpi"
  - type: textarea
    id: details
    attributes:
      label: Anything else? (tweaks used, or the failure)
      description: "If it failed, paste the relevant lines from `/var/log/cups/error_log` — please redact any hostnames/IPs."
